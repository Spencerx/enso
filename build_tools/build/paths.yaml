# This file is used to generate `target/<profile>/build/enso-build-<hash>/out/paths.rs`.
# Generation logic is in `build/macros/lib/src/paths.rs`.
# @formatter:off

<repo_root>/:
  .github/:
    workflows/:
      changelog.yml:
      engine-benchmark.yml:
      engine-checks-nightly.yml:
      engine-checks.yml:
      extra-nightly-tests.yml:
      ide-packaging.yml:
      nightly.yml:
      promote.yml:
      release.yml:
      std-libs-benchmark.yml:
      std-libs-labels.yml:
      wasm-checks.yml:
  app/:
    gui/: # GUI.
      dist/:
      playwright-report/: # Test results for the GUI that we want to keep as artifacts.
      public/:
        font-enso/:
        font-mplus1/:
        font-dejavu/:
      src/:
        project-view/:
          assets/:
            font-enso.css:
            font-mplus1.css:
            font-dejavu.css:
    ide-desktop/:
      client/:
      common/:
      icons/:
  build/:
    prettier/:
  built-distribution/:
    enso-engine-<triple>/:
      ? path: enso-<version>/
        type: engine_package
        var: engine_package
    enso-launcher-<triple>/:
      ? path: enso/
        type: launcher_package
        var: launcher_package
    engine-bundle-<triple>/:
      ? path: enso/
        type: engine_bundle
        var: engine_bundle
    enso-bundle-<triple>/:
      ? path: enso/
        type: launcher_bundle
        var: launcher_bundle
  dist/:
    gui/:
      assets/:
  distribution/:
    editions/:
      <edition>.yaml:
    enso.bundle.template:
    launcher-manifest.yaml:
    edition.template.yaml:
    lib:
  engine/:
    runner/:
      src/:
        test/:
          resources/:
            Factorial.enso:
      target/:
        native-image-args.txt:
    runtime/:
      target/:
    launcher/:
      target/:
        native-image-args.txt:
    runtime-benchmarks/:
      bench-report.xml:
  lib/:
    java/:
      ydoc-server/:
        target/:
          native-image/:
    rust/:
      parser/:
        generate-java/:
          java/:
  target/:
    enso-pack/:
      dist/: # Here ensogl-pack outputs its artifacts
    generated-java/:
    rust/:
    test-results/:
    small-jdk/:
  test/:
    Benchmarks/:
  tools/:
    ci/:
      docker/:
        engine/:
          docker-entrypoint.sh:
          Dockerfile:
    simple-library-server/:
  std-bits/:
    benchmarks/:
      bench-report.xml:
  project/:
    Dependencies.scala:
  build.sbt:
  run:
  CHANGELOG.md:

# Launcher Package
{ path: enso/, var: launcher_package }:
  bin/:
    enso<exe>:

# Engine Package aka Enso Version Package
# https://enso.org/docs/developer/enso/distribution/distribution.html#layout-of-an-enso-version-package
{ path: enso-<version>/, var: engine_package }:
  bin/:
  components/:
  editions/:
  lib/:
    Standard/:
  manifest.yaml:

# Launcher Bundle aka Portable Enso Distribution
# https://enso.org/docs/developer/enso/distribution/distribution.html#portable-enso-distribution-layout
{ path: enso/, var: launcher_bundle }:
  dist/:
    <version>/:
  edition/:
    <edition>.yaml:
  runtime/:
  .enso.bundle:

# Engine Bundle
# https://enso.org/docs/developer/enso/distribution/distribution.html#portable-enso-distribution-layout
{ path: enso/, var: engine_bundle }:
  dist/:
    <version>/:
  runtime/:
  .enso.bundle:
