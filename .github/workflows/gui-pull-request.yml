# This file is not auto-generated. Feel free to edit it.

name: ✨ GUI

on:
  push:
    branches:
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-gui-pull-request
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

permissions:
  contents: read # Read-only access to repository contents
  issues: write # Write access to issues
  pull-requests: write # Write access to pull requests
  statuses: write # Write access to commit statuses
  checks: write
  id-token: write
  pages: write

jobs:
  gui-changed-files:
    name: 🔍 Files Changed
    uses: ./.github/workflows/gui-changed-files.yml
    secrets: inherit

  prettier:
    name: 🧹 Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: false
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        name: ⎔ Setup Node
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: actions/cache/restore@v4
        name: Download cache
        id: cache
        with:
          path: |
            node_modules/.cache/prettier
          key: ${{ runner.os }}-gui-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gui
      - name: Run prettier
        run: pnpm run ci:prettier
      - name: 💾 Save cache
        uses: actions/cache/save@v4
        if: always() && steps.cache.outputs.cache-hit != 'true'
        id: save-cache
        with:
          key: ${{ steps.cache.outputs.cache-primary-key }}
          path: |
            node_modules/.cache/prettier

  gui-checks:
    name: 🧰 Checks
    uses: ./.github/workflows/gui-checks.yml
    needs: [gui-changed-files]
    if: needs.gui-changed-files.outputs.any_changed == 'true' || github.ref == 'refs/heads/develop'
    secrets: inherit

  storybook:
    name: 📚 Deploy Storybook
    uses: ./.github/workflows/storybook.yml
    needs: [gui-changed-files]
    if: needs.gui-changed-files.outputs.any_changed == 'true' || github.ref == 'refs/heads/develop'
    secrets: inherit

  finish-message:
    name: 📝 Finish Message
    runs-on: ubuntu-latest
    needs: [prettier, gui-checks, storybook]
    if: always()
    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-tags: false

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setMessage } = await import('${{ github.workspace }}/app/gui/scripts/ci/set-message.js')

            await setMessage({
              id: "title-message",
              header: "## ✨ GUI Checks Results",
              context,
              body: `
                ### Summary
                - 🧹 Prettier: ${${{needs.prettier.result == 'success'}} ? '✅ Passed' : '❌ Failed'}
                - 🧰 GUI Checks: ${${{needs.gui-checks.result == 'success'}} ? '✅ Passed' : '❌ Failed'}
                - 📚 Storybook: ${${{needs.storybook.result == 'success'}} ? '✅ Deployed' : '❌ Failed'}
                
                ${${{needs.prettier.result == 'success'}} && ${{needs.gui-checks.result == 'success'}} && ${{needs.storybook.result == 'success'}} 
                  ? '> ✅ **All checks passed!** Your changes look good to go.'
                  : '> ⚠️ **Action Required**: Please review the failed checks and fix them before merging.'}
                
                See individual check results for more details.
              `,
              github,
              repo: context.repo,
              prNumber: context.payload.pull_request.number
            })
  required-checks:
    name: GUI Required Checks
    runs-on: ubuntu-latest
    needs: [gui-changed-files, prettier, gui-checks, storybook]
    if: always()
    steps:
      - name: Checks Summary
        run: |
          echo "Prettier: ${{ needs.prettier.result }}"
          echo "GUI Checks: ${{ needs.gui-checks.result }}"
          echo "Storybook: ${{ needs.storybook.result }}"

          any_changed='${{ needs.gui-changed-files.outputs.any_changed }}'

          declare -a checks
          checks+=("${{ needs.prettier.result }}")
          checks+=("${{ needs.gui-checks.result }}")
          checks+=("${{ needs.storybook.result }}")

          for result in "${checks[@]}"; do
            case "$result" in
              'failure')
                exit 1
                ;;
              'skipped' | 'cancelled')
                if [[ "$any_changed" == 'true' ]]; then
                  exit 1
                fi
                ;;
            esac
          done

          echo "Success!"
